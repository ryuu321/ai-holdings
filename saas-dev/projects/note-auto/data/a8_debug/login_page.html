function dispFormFields() {

	if ($("#err_email").text().trim()) {
		$("#email").attr("class", changeStyle("email", "error").join(" "));
	} else if ($("#email").val().trim()) {
		$("#email").attr("class", changeStyle("email", "ok").join(" "));
	} else {
		$("#email").attr("class", changeStyle("email", "").join(" "));
	}
	if ($("#err_confirm_email").text().trim()) {
		$("#confirm_email").attr("class", changeStyle("confirm_email", "error").join(" "));
	} else if ($("#confirm_email").val().trim()) {
		$("#confirm_email").attr("class", changeStyle("confirm_email", "ok").join(" "));
	} else {
		$("#confirm_email").attr("class", changeStyle("confirm_email", "").join(" "));
	}
}
function changeStyle(elementId, changeStyle) {
	var style;
	var styles;
	if ($("#" + elementId).prop("tagName").toUpperCase() === 'SELECT') {
		style =  $("#" + elementId).parent().attr("class");
		if (!style) {
			return [changeStyle];
		}
		styles =$("#" + elementId).parent().attr("class").split(" ");
	} else {
		style =  $("#" + elementId).attr("class");
		if (!style) {
			return [changeStyle];
		}
		styles = $("#" + elementId).attr("class").split(" ");
	}
	var newStyle = [];
	for (var i = 0; i < styles.length; i++) {
		if ("ok" === styles[i] || "error" == styles[i]) {
			continue;
		}
		newStyle.push(styles[i]);
	}
	newStyle.push(changeStyle);
	return newStyle;
}
