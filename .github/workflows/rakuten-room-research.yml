name: rakuten-room リサーチ（週1回）

on:
  schedule:
    - cron: '0 21 * * 0'   # 毎週月曜 JST 06:00
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  research:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: 依存パッケージインストール
        run: pip install groq pandas requests beautifulsoup4

      - name: リサーチ実行
        env:
          GROQ_API_KEY:     ${{ secrets.GROQ_API_KEY }}
          PYTHONIOENCODING: utf-8
        run: cd saas-dev/projects/rakuten-room && python -u research_products.py

      - name: CSVをリポジトリに保存
        if: always()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add saas-dev/projects/rakuten-room/data/products.csv 2>/dev/null || true
          git diff --staged --quiet || git commit -m "rakuten-room: $(date -u '+%Y-%m-%d') リサーチ更新 [skip ci]"
          git pull --rebase -X theirs
          git push
