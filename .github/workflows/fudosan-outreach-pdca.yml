name: fudosan-outreach-pdca

on:
  schedule:
    - cron: "0 20 * * 0"  # 毎週日曜 JST 05:00 (UTC 20:00)
  workflow_dispatch:

jobs:
  pdca:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Restore sent_log from Gist
        env:
          GIST_TOKEN: ${{ secrets.GIST_TOKEN }}
          GIST_ID: ${{ secrets.SENT_LOG_GIST_ID }}
        run: |
          curl -sf -H "Authorization: token $GIST_TOKEN" \
            "https://api.github.com/gists/$GIST_ID" \
            | python3 -c "
          import sys, json
          data = json.load(sys.stdin)
          content = data['files'].get('sent_log.csv', {}).get('content', '')
          print(content, end='')
          " > saas-dev/projects/fudosan-copy/outreach/sent_log.csv || echo "Gist取得失敗"

      - name: Run PDCA analysis
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHANNEL_ID: ${{ secrets.TELEGRAM_CHANNEL_ID }}
        run: |
          python shared/gtm/analytics/outreach_pdca.py \
            --sent-log saas-dev/projects/fudosan-copy/outreach/sent_log.csv \
            --project fudotext

      - name: Create PR if templates changed
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          branch: fudosan-outreach-pdca/${{ github.run_number }}
          title: "fudotext: コールドメールテンプレ自動改善 #${{ github.run_number }}"
          body: |
            ## PDCA 自動改善

            返信率が目標（2%）を下回ったため、Gemini がテンプレを改善しました。

            ### 確認ポイント
            - [ ] sequence_1.txt の変更内容が自然か
            - [ ] sequence_2.txt のフォローアップが適切か
            - [ ] テンプレート変数（{company_name}等）が残っているか
            - [ ] 特定電子メール法のオプトアウト文言が残っているか

            > マージ後、次回パイプライン実行から新テンプレが使われます。
          commit-message: "fudotext: コールドメールテンプレ自動改善 [skip ci]"
          add-paths: |
            shared/gtm/outreach/templates/sequence_1.txt
            shared/gtm/outreach/templates/sequence_2.txt
