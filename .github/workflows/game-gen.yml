name: ゲーム自動生成

on:
  workflow_dispatch:
    inputs:
      concept:
        description: 'ゲームの構想（例: 寿司を集めるクリッカーゲーム）'
        required: true
        type: string
      game_id:
        description: 'ゲームID（英数字・ハイフンのみ）'
        required: true
        default: 'my-game'
        type: string

jobs:
  generate:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 依存インストール
        run: pip install groq

      - name: ゲーム生成
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          GAME_CONCEPT: ${{ inputs.concept }}
          GAME_ID: ${{ inputs.game_id }}
        run: |
          cd saas-dev/projects/game-gen
          python generate.py

      - name: ryuu321/games にデプロイ
        env:
          DEPLOY_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          # games リポをクローン
          git clone https://x-access-token:${{ secrets.GAMES_DEPLOY_TOKEN }}@github.com/ryuu321/games.git /tmp/games

          # ゲームをコピー
          mkdir -p /tmp/games/games/${{ inputs.game_id }}
          cp -r saas-dev/projects/game-gen/output/${{ inputs.game_id }}/. /tmp/games/games/${{ inputs.game_id }}/

          # インデックスを更新
          python saas-dev/projects/game-gen/update_index.py /tmp/games "${{ inputs.game_id }}" "${{ inputs.concept }}"

          cd /tmp/games
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git diff --cached --quiet || git commit -m "game-gen: ${{ inputs.game_id }} を追加"
          git push

          echo ""
          echo "公開URL: https://ryuu321.github.io/games/games/${{ inputs.game_id }}/"
