name: SCALP Bot（15分ごと）

on:
  schedule:
    - cron: '*/15 * * * *'
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  scalp:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: 依存インストール
        run: pip install yfinance numpy pandas

      - name: SCALP実行
        run: python -u saas-dev/projects/auto-invest/scalp/main.py
        env:
          PYTHONIOENCODING: utf-8

      - name: 結果を保存
        if: always()
        run: |
          git config user.email "actions@github.com"
          git config user.name "Auto Bot"
          git add saas-dev/projects/auto-invest/data/portfolio_scalp.json \
                  saas-dev/projects/auto-invest/data/scalp_trades.json 2>/dev/null || true
          git diff --staged --quiet || git commit -m "scalp: $(date -u '+%Y-%m-%d %H:%M') [skip ci]"
          git pull --rebase -X theirs
          git push
