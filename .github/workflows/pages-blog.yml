name: GitHub Pages ブログ自動生成

on:
  schedule:
    - cron: '0 5 * * *'   # 毎日 JST 14:00（Gumroad商品が更新された後）
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  generate:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: GitHub Pagesブログ生成
        env:
          GUMROAD_ACCESS_TOKEN: ${{ secrets.GUMROAD_ACCESS_TOKEN }}
          PYTHONIOENCODING: utf-8
        run: |
          cd saas-dev/projects/ventures/pages_publisher
          python -u generate.py

      - name: 生成ファイルをコミット
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/blog/
          git diff --cached --quiet || git commit -m "pages: auto-blog $(date +%Y-%m-%d) [skip ci]"
          git pull --rebase -X theirs
          git push
