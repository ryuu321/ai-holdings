name: VOLTボット（4時間ごと）

on:
  schedule:
    - cron: '30 */4 * * *'   # 4時間ごと（ATTACKの30分後）
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  run-volt-bot:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: コードを取得
        uses: actions/checkout@v4

      - name: Python セットアップ
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: 依存パッケージインストール
        run: pip install -r saas-dev/projects/auto-invest/requirements.txt

      - name: VOLTボット実行
        run: |
          cd saas-dev/projects/auto-invest/volt
          python -u main.py
        env:
          PYTHONIOENCODING: utf-8

      - name: 結果をリポジトリに保存
        run: |
          git config user.email "actions@github.com"
          git config user.name "Auto Bot"
          git add saas-dev/projects/auto-invest/data/portfolio_volt.json
          git diff --staged --quiet || git commit -m "bot(volt): update $(date -u '+%Y-%m-%d %H:%M') [skip ci]"
          git pull --rebase -X theirs
          git push
