name: Gumroad Generate & Publish

on:
  schedule:
    - cron: '0 0 * * 1,3,5'   # 月水金 JST9時（UTC0時）
  workflow_dispatch:
    inputs:
      niche:
        description: 'ニッチ指定（空でPDCA自動選択）'
        required: false
      type:
        description: 'ai_prompts or notion_template（空で自動）'
        required: false

jobs:
  generate:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r saas-dev/projects/gumroad/requirements.txt

      - name: Install Playwright browsers
        run: playwright install chromium --with-deps

      - name: Install traffic dependencies
        run: pip install -r saas-dev/projects/traffic/requirements.txt

      - name: Restore sessions
        run: |
          mkdir -p saas-dev/projects/gumroad/data saas-dev/projects/traffic/data
          B64="${{ secrets.GUMROAD_SESSION_B64 }}"
          [ -n "$B64" ] && echo "$B64" | base64 -d > saas-dev/projects/gumroad/data/gumroad_session.json || true
          B64P="${{ secrets.PINTEREST_SESSION_B64 }}"
          [ -n "$B64P" ] && echo "$B64P" | base64 -d > saas-dev/projects/traffic/data/pinterest_session.json || true

      - name: Generate & Publish
        working-directory: saas-dev/projects/gumroad
        env:
          GUMROAD_ACCESS_TOKEN: ${{ secrets.GUMROAD_ACCESS_TOKEN }}
          GROQ_API_KEY:         ${{ secrets.GROQ_API_KEY }}
          TELEGRAM_BOT_TOKEN:   ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHANNEL_ID:  ${{ secrets.TELEGRAM_CHANNEL_ID }}
          GUMLOAD_EMAIL:        ${{ secrets.GUMROAD_EMAIL }}
          GUMLOAD_PASSWORD:     ${{ secrets.GUMROAD_PASSWORD }}
          INPUT_NICHE: ${{ github.event.inputs.niche }}
          INPUT_TYPE:  ${{ github.event.inputs.type }}
        run: |
          ARGS=()
          [ -n "$INPUT_NICHE" ] && ARGS+=(--niche "$INPUT_NICHE")
          [ -n "$INPUT_TYPE"  ] && ARGS+=(--type "$INPUT_TYPE")
          python pipeline.py "${ARGS[@]}"

      - name: Save updated sessions & commit
        run: |
          git config user.name "gumroad-bot"
          git config user.email "bot@ai-holdings"
          git add saas-dev/projects/gumroad/data/ saas-dev/projects/traffic/data/ 2>/dev/null || true
          git diff --cached --quiet || git commit -m "gumroad: auto-publish $(date -u +%Y-%m-%d) [skip ci]"
          git pull --rebase -X theirs
          git push
