name: AI News Digest 自動投稿

on:
  schedule:
    - cron: '0 0 * * *'   # 毎日 JST 9:00
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install google-genai

      - name: AI News Digest 生成・投稿
        env:
          GEMINI_API_KEY:      ${{ secrets.GEMINI_API_KEY }}
          DEVTO_API_KEY:       ${{ secrets.DEVTO_API_KEY }}
          TELEGRAM_BOT_TOKEN:  ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHANNEL_ID: ${{ secrets.TELEGRAM_CHANNEL_ID }}
          PYTHONIOENCODING: utf-8
        run: |
          cd saas-dev/projects/ventures/news_publisher
          python -u main.py

      - name: コミット
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add saas-dev/projects/ventures/news_publisher/state.json 2>/dev/null || true
          git add docs/blog/en/ 2>/dev/null || true
          git diff --cached --quiet || git commit -m "news: AI digest $(date +%Y-%m-%d) [skip ci]"
          git pull --rebase -X theirs
          git push
