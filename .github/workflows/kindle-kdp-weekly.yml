name: Kindle KDP EPUB自動生成（週2回）

on:
  schedule:
    - cron: '0 22 * * 0'   # 日曜 JST 07:00
    - cron: '0 22 * * 3'   # 水曜 JST 07:00
  workflow_dispatch:

env:
  GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  generate:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 日本語フォントインストール
        run: sudo apt-get install -y fonts-noto-cjk

      - name: 依存パッケージインストール
        run: pip install -r saas-dev/projects/kindle-kdp/requirements.txt

      - name: EPUB生成
        run: |
          cd saas-dev/projects/kindle-kdp
          python -u main.py
        env:
          PYTHONIOENCODING: utf-8

      - name: 生成ファイルをコミット
        if: always()
        run: |
          git config user.email "actions@github.com"
          git config user.name "Auto Bot"
          git add saas-dev/projects/kindle-kdp/data/ saas-dev/projects/kindle-kdp/output/
          git diff --staged --quiet || git commit -m "kindle-kdp: $(date -u '+%Y-%m-%d') EPUB生成 [skip ci]"
          git pull --rebase -X theirs
          git push
