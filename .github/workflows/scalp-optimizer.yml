name: SCALP Optimizer（日次・戦略自動更新）

on:
  schedule:
    - cron: '0 15 * * *'   # 毎日 JST 0:00
  workflow_dispatch:

env:
  GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  optimize:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: 依存インストール
        run: pip install groq

      - name: オプティマイザー実行
        run: python -u saas-dev/projects/auto-invest/scalp/optimizer.py
        env:
          PYTHONIOENCODING: utf-8

      - name: 戦略ファイルを保存
        if: always()
        run: |
          git config user.email "actions@github.com"
          git config user.name "Auto Bot"
          git add saas-dev/projects/auto-invest/data/scalp_strategy.json \
                  saas-dev/projects/auto-invest/data/scalp_optimizer_log.json 2>/dev/null || true
          git diff --staged --quiet || git commit -m "scalp-optimizer: v$(date -u '+%Y-%m-%d') 戦略更新 [skip ci]"
          git pull --rebase -X theirs
          git push
