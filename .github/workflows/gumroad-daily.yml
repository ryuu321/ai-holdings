name: Gumroad Daily PDCA

on:
  schedule:
    - cron: '0 22 * * *'   # 毎日JST7時（UTC22時）
  workflow_dispatch:

jobs:
  pdca:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r saas-dev/projects/gumroad/requirements.txt

      - name: Run PDCA
        working-directory: saas-dev/projects/gumroad
        env:
          GUMROAD_ACCESS_TOKEN: ${{ secrets.GUMROAD_ACCESS_TOKEN }}
          GROQ_API_KEY:         ${{ secrets.GROQ_API_KEY }}
          TELEGRAM_BOT_TOKEN:   ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHANNEL_ID:  ${{ secrets.TELEGRAM_CHANNEL_ID }}
        run: python pipeline.py --pdca

      - name: Commit PDCA report
        run: |
          git config user.name "gumroad-bot"
          git config user.email "bot@ai-holdings"
          git add saas-dev/projects/gumroad/data/
          git diff --cached --quiet || git commit -m "gumroad: PDCA update $(date -u +%Y-%m-%d) [skip ci]"
          git push
