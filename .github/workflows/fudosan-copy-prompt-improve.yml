name: fudosan-copy — プロンプト自動改善

on:
  schedule:
    # 毎週日曜 22:00 UTC (月曜 07:00 JST)
    - cron: "0 22 * * 0"
  workflow_dispatch:

jobs:
  improve:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: 依存関係インストール
        run: pip install google-genai

      - name: フィードバック分析 & domain_knowledge.py 更新
        id: analyze
        env:
          FEEDBACK_SHEET_CSV_URL: ${{ secrets.FEEDBACK_SHEET_CSV_URL }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        working-directory: saas-dev/projects/fudosan-copy
        run: |
          output=$(python scripts/analyze_feedback.py 2>&1)
          echo "$output"
          if echo "$output" | grep -q "^CHANGED=true"; then
            echo "changed=true" >> $GITHUB_OUTPUT
          else
            echo "changed=false" >> $GITHUB_OUTPUT
          fi

      - name: バージョン番号を取得
        if: steps.analyze.outputs.changed == 'true'
        id: version
        working-directory: saas-dev/projects/fudosan-copy
        run: |
          ver=$(python -c "from domain_knowledge import PROMPT_VERSION; print(PROMPT_VERSION)")
          echo "version=$ver" >> $GITHUB_OUTPUT

      - name: PR 作成
        if: steps.analyze.outputs.changed == 'true'
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          branch: fudosan-prompt-improve/${{ steps.version.outputs.version }}
          title: "fudosan-copy: プロンプト自動改善 ${{ steps.version.outputs.version }}"
          body: |
            ## 変更内容

            週次フィードバック分析による `domain_knowledge.py` の自動更新です。

            ### 確認ポイント
            - [ ] `TARGET_APPEAL` の変更内容が妥当か
            - [ ] `CONVERSION_TIPS` の追記が景品表示法に違反していないか
            - [ ] `PROMPT_VERSION` が正しくインクリメントされているか
            - [ ] `feedback_reports/` のレポートを読んで根拠を確認する

            > **マージ後は Streamlit Cloud が自動デプロイします。**
          commit-message: "fudosan-copy: プロンプト自動改善 ${{ steps.version.outputs.version }}"
          add-paths: |
            saas-dev/projects/fudosan-copy/domain_knowledge.py
            saas-dev/projects/fudosan-copy/feedback_reports/
