name: fudotext-seo

on:
  schedule:
    - cron: "0 22 * * 0"   # 毎週日曜 22:00 UTC = 月曜 JST 7:00
  workflow_dispatch:

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Generate FudoText SEO pages
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: python saas-dev/projects/fudosan-copy/scripts/seo_pages.py

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/fudotext/
          git diff --cached --quiet || git commit -m "fudotext-seo: SEOページ自動生成 $(date +'%Y-%m-%d') [skip ci]"
          git push
