name: ventures-telegram-signals

on:
  schedule:
    - cron: '0 0 * * *'   # 毎日 JST 09:00
  workflow_dispatch:

jobs:
  signal:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    defaults:
      run:
        working-directory: saas-dev/projects/ventures/telegram_signals

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install google-genai

      - name: Post signals
        env:
          GEMINI_API_KEY:        ${{ secrets.GEMINI_API_KEY }}
          TELEGRAM_BOT_TOKEN:    ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHANNEL_ID:   ${{ secrets.TELEGRAM_CHANNEL_ID }}
        run: python main.py

      - name: Commit state
        run: |
          cd $GITHUB_WORKSPACE
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add saas-dev/projects/ventures/telegram_signals/state.json
          git diff --cached --quiet || git commit -m "bot(telegram): update $(date +%Y-%m-%d) [skip ci]"
          git push
