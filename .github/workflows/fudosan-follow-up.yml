name: fudosan-follow-up

on:
  schedule:
    - cron: "0 1 * * 2"  # 毎週火曜 JST 10:00 (UTC 01:00)
  workflow_dispatch:

jobs:
  follow-up:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install python-dotenv

      - name: Restore sent_log from Gist
        env:
          GIST_TOKEN: ${{ secrets.GIST_TOKEN }}
          GIST_ID: ${{ secrets.SENT_LOG_GIST_ID }}
        run: |
          curl -sf -H "Authorization: token $GIST_TOKEN" \
            "https://api.github.com/gists/$GIST_ID" \
            | python3 -c "
          import sys, json
          data = json.load(sys.stdin)
          content = data['files'].get('sent_log.csv', {}).get('content', '')
          print(content, end='')
          " > saas-dev/projects/fudosan-copy/outreach/sent_log.csv || echo "Gist取得失敗: 既存ファイルを使用"

      - name: Run follow-up
        env:
          GMAIL_ADDRESS: ${{ secrets.GMAIL_ADDRESS }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
        run: python saas-dev/projects/fudosan-copy/outreach/follow_up.py --days 7

      - name: Upload sent_log to Gist
        env:
          GIST_TOKEN: ${{ secrets.GIST_TOKEN }}
          GIST_ID: ${{ secrets.SENT_LOG_GIST_ID }}
        run: |
          python3 -c "
          import json
          content = open('saas-dev/projects/fudosan-copy/outreach/sent_log.csv', encoding='utf-8').read()
          print(json.dumps({'files': {'sent_log.csv': {'content': content}}}))
          " | curl -sf -X PATCH \
            -H "Authorization: token $GIST_TOKEN" \
            -H "Content-Type: application/json" \
            -d @- \
            "https://api.github.com/gists/$GIST_ID"
          echo "sent_log.csv をGistに保存しました"
