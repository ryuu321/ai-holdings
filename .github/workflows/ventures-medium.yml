name: ventures-medium-publisher

on:
  schedule:
    - cron: '0 2 * * *'   # 毎日 JST 11:00
    - cron: '0 11 * * *'  # 毎日 JST 20:00
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    defaults:
      run:
        working-directory: saas-dev/projects/ventures/medium_publisher

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install google-genai

      - name: Publish to Medium
        env:
          GEMINI_API_KEY:          ${{ secrets.GEMINI_API_KEY }}
          DEVTO_API_KEY:           ${{ secrets.DEVTO_API_KEY }}
          HASHNODE_API_KEY:        ${{ secrets.HASHNODE_API_KEY }}
          HASHNODE_PUBLICATION_ID: ${{ secrets.HASHNODE_PUBLICATION_ID }}
        run: python main.py

      - name: Commit state and pages
        run: |
          cd $GITHUB_WORKSPACE
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add saas-dev/projects/ventures/medium_publisher/state.json
          git add docs/blog/en/ 2>/dev/null || true
          git diff --cached --quiet || git commit -m "bot(medium): update $(date +%Y-%m-%d) [skip ci]"
          git pull --rebase -X theirs
          git push
