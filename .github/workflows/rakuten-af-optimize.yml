name: 楽天AF 週次最適化

on:
  schedule:
    - cron: '0 20 * * 0'   # 毎週日曜 UTC 20:00（日本時間 月曜 5:00）
  workflow_dispatch:

env:
  GROQ_API_KEY:         ${{ secrets.GROQ_API_KEY }}
  RAKUTEN_AFFILIATE_ID: ${{ secrets.RAKUTEN_AFFILIATE_ID }}
  HATENA_ID:            ${{ secrets.HATENA_ID }}
  HATENA_BLOG_ID:       ${{ secrets.HATENA_BLOG_ID }}
  HATENA_API_KEY:       ${{ secrets.HATENA_API_KEY }}
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  optimize:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: 依存パッケージインストール
        run: pip install -r saas-dev/projects/rakuten-af/requirements.txt

      - name: 週次プロンプト最適化
        run: |
          cd saas-dev/projects/rakuten-af
          python -u -c "from modules.optimizer import run_optimization; run_optimization()"
        env:
          PYTHONIOENCODING: utf-8

      - name: 最適化結果をリポジトリに保存
        if: always()
        run: |
          git config user.email "actions@github.com"
          git config user.name "Auto Bot"
          git add saas-dev/projects/rakuten-af/data/ 2>/dev/null || true
          git diff --staged --quiet || git commit -m "rakuten-af: 週次最適化 $(date -u '+%Y-%m-%d') [skip ci]"
          git pull --rebase -X theirs
          git push
