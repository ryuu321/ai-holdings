name: note自動投稿 3アカウント（毎日）

on:
  schedule:
    - cron: '0 1 * * *'   # 毎日 UTC 1:00（日本時間 10:00）
  workflow_dispatch:

env:
  GEMINI_API_KEY:    ${{ secrets.GEMINI_API_KEY }}
  NOTE_EMAIL_1:      ${{ secrets.NOTE_EMAIL_1 }}
  NOTE_PASSWORD_1:   ${{ secrets.NOTE_PASSWORD_1 }}
  NOTE_EMAIL_2:      ${{ secrets.NOTE_EMAIL_2 }}
  NOTE_PASSWORD_2:   ${{ secrets.NOTE_PASSWORD_2 }}
  NOTE_EMAIL_3:      ${{ secrets.NOTE_EMAIL_3 }}
  NOTE_PASSWORD_3:   ${{ secrets.NOTE_PASSWORD_3 }}
  NOTE_SESSION_1:    ${{ secrets.NOTE_SESSION_1 }}
  NOTE_SESSION_2:    ${{ secrets.NOTE_SESSION_2 }}
  NOTE_SESSION_3:    ${{ secrets.NOTE_SESSION_3 }}
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  post-articles:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: コードを取得
        uses: actions/checkout@v4

      - name: Python セットアップ
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: 依存パッケージインストール
        run: pip install -r saas-dev/projects/note-auto/requirements.txt

      - name: セッションファイルを復元
        shell: python3 {0}
        working-directory: saas-dev/projects/note-auto
        run: |
          import base64, os, re
          for i in [1, 2, 3]:
              val = os.environ.get(f'NOTE_SESSION_{i}', '')
              val = re.sub(r'[^A-Za-z0-9+/=]', '', val)
              if val:
                  with open(f'note_session_{i}.json', 'wb') as f:
                      f.write(base64.b64decode(val + '=='))
                  print(f'note_session_{i}.json 復元済み')
              else:
                  print(f'note_session_{i}.json: Secretなし（スキップ）')
        env:
          NOTE_SESSION_1: ${{ secrets.NOTE_SESSION_1 }}
          NOTE_SESSION_2: ${{ secrets.NOTE_SESSION_2 }}
          NOTE_SESSION_3: ${{ secrets.NOTE_SESSION_3 }}

      - name: 全アカウント投稿実行（順番に）
        run: |
          cd saas-dev/projects/note-auto
          python -u main.py
        env:
          PYTHONIOENCODING: utf-8

      - name: 結果をリポジトリに保存
        if: always()
        run: |
          git config user.email "actions@github.com"
          git config user.name "Auto Bot"
          git add saas-dev/projects/note-auto/state_*.json 2>/dev/null || true
          git add note-biz/output/ 2>/dev/null || true
          git diff --staged --quiet || git commit -m "note-auto: $(date -u '+%Y-%m-%d') 3アカウント投稿 [skip ci]"
          git pull --rebase -X theirs
          git push
