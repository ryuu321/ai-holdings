name: ventures-digital-templates

on:
  schedule:
    - cron: '0 23 * * 0'  # 毎週月曜 JST 08:00
  workflow_dispatch:

jobs:
  generate:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: saas-dev/projects/ventures/digital_templates

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install fonts (Japanese)
        run: sudo apt-get install -y fonts-noto-cjk

      - name: Install dependencies
        run: pip install google-genai Pillow

      - name: Generate & publish templates
        env:
          GEMINI_API_KEY:   ${{ secrets.GEMINI_API_KEY }}
          GUMROAD_API_KEY:  ${{ secrets.GUMROAD_API_KEY }}
          NOTE_EMAIL_1:     ${{ secrets.NOTE_EMAIL_1 }}
          NOTE_PASSWORD_1:  ${{ secrets.NOTE_PASSWORD_1 }}
          NOTE_SESSION_1:   ${{ secrets.NOTE_SESSION_1 }}
        run: python main.py

      - name: Commit state & outputs
        run: |
          cd $GITHUB_WORKSPACE
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add saas-dev/projects/ventures/digital_templates/state.json
          git add saas-dev/projects/ventures/digital_templates/output/ 2>/dev/null || true
          git diff --cached --quiet || git commit -m "bot(templates): generate $(date +%Y-%m-%d) [skip ci]"
          git push
