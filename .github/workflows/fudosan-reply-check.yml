name: fudosan-reply-check

on:
  schedule:
    - cron: "0 1 * * 1"  # 毎週月曜 JST 10:00 (UTC 01:00)
  workflow_dispatch:       # 手動実行用

jobs:
  check-replies:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install python-dotenv

      - name: Check and mark replies
        env:
          GMAIL_ADDRESS: ${{ secrets.GMAIL_ADDRESS }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
        run: python saas-dev/projects/fudosan-copy/outreach/check_replies.py --mark

      - name: Commit updated sent_log
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add saas-dev/projects/fudosan-copy/outreach/sent_log.csv
          git diff --staged --quiet || git commit -m "bot(fudosan): reply check $(date +%Y-%m-%d) [skip ci]"
          git push
