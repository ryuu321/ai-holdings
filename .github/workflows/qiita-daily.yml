name: Qiita 日次投稿

on:
  schedule:
    - cron: '0 3 * * *'    # JST 12:00（note-autoの翌日分が溜まってから）
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Qiita投稿実行
        env:
          QIITA_ACCESS_TOKEN: ${{ secrets.QIITA_ACCESS_TOKEN }}
          PYTHONIOENCODING: utf-8
        run: |
          cd saas-dev/projects/ventures/qiita_publisher
          python -u main.py

      - name: 状態をコミット
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add saas-dev/projects/ventures/qiita_publisher/state.json 2>/dev/null || true
          git diff --cached --quiet || git commit -m "qiita: auto-post $(date +%Y-%m-%d) [skip ci]"
          git pull --rebase -X theirs
          git push
