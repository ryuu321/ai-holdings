name: fudosan-copy tests

on:
  push:
    paths:
      - "saas-dev/projects/fudosan-copy/**"
      - "shared/gtm/**"
  pull_request:
    paths:
      - "saas-dev/projects/fudosan-copy/**"
      - "shared/gtm/**"

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: saas-dev/projects/fudosan-copy/requirements.txt

      - name: Install dependencies
        run: |
          pip install -r saas-dev/projects/fudosan-copy/requirements.txt
          pip install pytest

      - name: Run GTM tests
        env:
          GEMINI_API_KEY: dummy-key-for-ci
        run: python -m pytest shared/gtm/tests/ -v --tb=short

      - name: Run fudosan app tests
        env:
          GEMINI_API_KEY: dummy-key-for-ci
        run: python -m pytest saas-dev/projects/fudosan-copy/tests/ -v --tb=short
