name: rakuten-room 自動投稿（1日4回）

on:
  schedule:
    - cron: '0 22 * * *'   # JST 07:00
    - cron: '0 3 * * *'    # JST 12:00
    - cron: '0 9 * * *'    # JST 18:00
    - cron: '0 13 * * *'   # JST 22:00
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  post:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: 依存パッケージインストール
        run: pip install -r saas-dev/projects/rakuten-room/requirements.txt

      - name: Playwright Chromiumインストール
        run: playwright install chromium --with-deps

      - name: auth.json復元
        env:
          RAKUTEN_AUTH_JSON: ${{ secrets.RAKUTEN_AUTH_JSON }}
        run: |
          if [ -n "$RAKUTEN_AUTH_JSON" ]; then
            echo "$RAKUTEN_AUTH_JSON" | base64 -d > saas-dev/projects/rakuten-room/auth.json
            echo "auth.json 復元完了"
          else
            echo "RAKUTEN_AUTH_JSON未設定、スキップ"
          fi

      - name: ROOM商品スクレイプ（毎回実行）
        env:
          PYTHONIOENCODING: utf-8
        run: |
          cd saas-dev/projects/rakuten-room
          echo "ROOMスクレイプ開始（score=0.99で投稿優先）"
          python -u fetch_room_products.py --count 100

      - name: 投稿実行
        env:
          RAKUTEN_ID:           ${{ secrets.RAKUTEN_ID }}
          RAKUTEN_PASSWORD:     ${{ secrets.RAKUTEN_PASSWORD }}
          RAKUTEN_APP_ID:       ${{ secrets.RAKUTEN_APP_ID }}
          RAKUTEN_ACCESS_KEY:   ${{ secrets.RAKUTEN_ACCESS_KEY }}
          RAKUTEN_AFFILIATE_ID: ${{ secrets.RAKUTEN_AFFILIATE_ID }}
          GITHUB_TOKEN:         ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY:    ${{ github.repository }}
          PYTHONIOENCODING: utf-8
        run: cd saas-dev/projects/rakuten-room && python -u main.py

      - name: CSVをリポジトリに保存
        if: always()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add saas-dev/projects/rakuten-room/data/ 2>/dev/null || true
          git diff --staged --quiet || git commit -m "rakuten-room: $(date -u '+%Y-%m-%d %H:%M') 自動投稿 [skip ci]"
          git pull --rebase -X theirs
          git push
